<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>腹肌觉醒 · 20岁男生动态减脂仪表盘</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(150deg, #0b0b14 0%, #1a1e2b 100%);
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #eaeef5;
    }
    .dashboard {
      max-width: 720px;
      width: 100%;
      background: rgba(18, 20, 30, 0.8);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 44px;
      padding: 26px 24px 32px;
      box-shadow: 0 35px 55px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    h1 {
      font-size: 2.3rem;
      font-weight: 700;
      letter-spacing: -0.4px;
      background: linear-gradient(135deg, #b3e0ff, #6d8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .subtitle {
      font-size: 0.95rem;
      color: #8892b0;
      margin-bottom: 24px;
      border-left: 4px solid #4f7df3;
      padding-left: 14px;
    }
    .profile-badge {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 100px;
      padding: 10px 18px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      font-size: 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(10, 12, 22, 0.6);
    }
    .badge-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .badge-item span:first-child {
      color: #99a5c0;
    }
    .badge-item strong {
      color: white;
      font-weight: 600;
    }
    .card {
      background: rgba(12, 14, 24, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 22px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.2s ease;
    }
    .input-row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 18px;
    }
    .input-group {
      flex: 1 1 140px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      color: #8e9bb5;
    }
    input {
      background: #1e2230;
      border: 1px solid #2f3548;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 1rem;
      color: white;
      outline: none;
      transition: 0.2s;
      font-weight: 500;
    }
    input:focus {
      border-color: #4f7df3;
      box-shadow: 0 0 0 3px rgba(79, 125, 243, 0.3);
    }
    button {
      background: #2c3e6b;
      border: none;
      border-radius: 40px;
      padding: 14px 28px;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.3px;
      color: white;
      background: linear-gradient(135deg, #3152a0, #1a2e5e);
      box-shadow: 0 8px 18px rgba(0, 30, 80, 0.5);
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    button:hover {
      background: linear-gradient(135deg, #3d64c0, #233d7a);
      box-shadow: 0 10px 22px rgba(0, 40, 100, 0.7);
    }
    .advice-block {
      margin-top: 20px;
    }
    .think-process {
      background: rgba(255, 215, 150, 0.08);
      border-left: 4px solid #f0b34b;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 18px;
      font-size: 0.9rem;
      color: #cfd7ea;
      background: #1b1f2b;
    }
    .think-process strong {
      color: #f5c462;
      display: block;
      margin-bottom: 6px;
    }
    .final-advice {
      background: #0f1829;
      border-radius: 22px;
      padding: 18px;
      border: 1px solid #2e3b55;
    }
    .final-advice h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #a7c0ff;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .plan-item {
      background: #1a1f30;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .plan-item strong {
      color: #f0e68c;
    }
    .weight-trend {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
    }
    hr {
      border-color: rgba(255, 255, 255, 0.1);
      margin: 14px 0;
    }
    .small-note {
      font-size: 0.8rem;
      color: #8791a8;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <h1>⚡腹肌觉醒</h1>
    <div class="subtitle">20岁 · 176cm · 四肢肌肉型 · 腹部臀部脂肪攻坚</div>

    <div class="profile-badge">
      <div class="badge-item"><span>🧬 年龄</span><strong>20岁</strong></div>
      <div class="badge-item"><span>📏 身高</span><strong>176 cm</strong></div>
      <div class="badge-item"><span>⚖️ 初始体重</span><strong>95 kg</strong></div>
      <div class="badge-item"><span>🎯 目标</span><strong>快速瘦肚子·保留肌肉</strong></div>
    </div>

    <div class="card">
      <div class="input-row">
        <div class="input-group">
          <label>🌙 昨晚入睡时间</label>
          <input type="time" id="sleepTime" value="22:00">
        </div>
        <div class="input-group">
          <label>☀️ 今早起时间</label>
          <input type="time" id="wakeTime" value="05:30">
        </div>
        <div class="input-group">
          <label>⚖️ 空腹体重 (kg)</label>
          <input type="number" id="weightInput" placeholder="94.2" step="0.1" value="94.2">
        </div>
        <button id="updateBtn">📊 更新今日计划</button>
      </div>
      <div class="small-note" style="margin-top: 4px;">💡 每天早起称重后填写，获得动态建议</div>
    </div>

    <div class="advice-block" id="adviceContainer">
      <div class="think-process" id="thinkBox">
        <strong>🧠 思考过程</strong>
        <span id="thinkContent">等待数据输入... 系统将根据20岁男性、四肢肌肉型、腹部脂肪特点分析。</span>
      </div>
      <div class="final-advice" id="finalBox">
        <h3>📋 今日动态结论</h3>
        <div id="finalContent">
          <div class="plan-item">
            <strong>🍽️ 饮食建议</strong><br>
            <span>请输入今日体重与作息，生成个性化方案。</span>
          </div>
          <div class="plan-item">
            <strong>🏃 运动与睡眠</strong><br>
            <span>基于实时数据调整。</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const USER = {
      age: 20,
      heightCm: 176,
      initialWeightKg: 95,
      gender: 'male',
      bodyType: '四肢肌肉型，脂肪主要囤积在腹部和臀部',
    };

    const sleepTimeInput = document.getElementById('sleepTime');
    const wakeTimeInput = document.getElementById('wakeTime');
    const weightInput = document.getElementById('weightInput');
    const updateBtn = document.getElementById('updateBtn');
    const thinkContent = document.getElementById('thinkContent');
    const finalContent = document.getElementById('finalContent');

    function calculateSleepHours(sleepTimeStr, wakeTimeStr) {
      if (!sleepTimeStr || !wakeTimeStr) return null;
      const [sHour, sMin] = sleepTimeStr.split(':').map(Number);
      const [wHour, wMin] = wakeTimeStr.split(':').map(Number);
      let sleepDate = new Date(2026, 6, 2, sHour, sMin);
      let wakeDate = new Date(2026, 6, 3, wHour, wMin);
      let diffMs = wakeDate - sleepDate;
      if (diffMs < 0) {
        wakeDate = new Date(2026, 6, 3, wHour, wMin);
        diffMs = wakeDate - sleepDate;
      }
      return diffMs / (1000 * 60 * 60);
    }

    function generateAdvice(sleepHours, currentWeight, wakeTimeStr) {
      const heightM = USER.heightCm / 100;
      const bmi = currentWeight / (heightM * heightM);
      const weightDelta = currentWeight - USER.initialWeightKg;

      let sleepQuality = '';
      let sleepAdvice = '';
      if (sleepHours >= 7.2 && sleepHours <= 8.0) {
        sleepQuality = '优秀';
        sleepAdvice = '睡眠时长完美，生长激素分泌充足，利于腹部脂肪分解。';
      } else if (sleepHours >= 6.5 && sleepHours < 7.2) {
        sleepQuality = '尚可';
        sleepAdvice = '睡眠略不足，可能轻微影响瘦素，建议今晚提前20分钟入睡。';
      } else if (sleepHours < 6.5) {
        sleepQuality = '不足';
        sleepAdvice = '严重睡眠不足！皮质醇易升高，腹部脂肪更顽固。今晚务必22:30前上床。';
      } else {
        sleepQuality = '过长';
        sleepAdvice = '睡眠超过8.5小时可能打乱节律，建议控制在7-7.5小时。';
      }

      let wakeSuggestion = '';
      if (wakeTimeStr) {
        const [wH, wM] = wakeTimeStr.split(':').map(Number);
        if (wH === 5 && wM <= 40) {
          wakeSuggestion = '起床时间非常理想，适合空腹有氧。';
        } else if (wH > 5 && wH <= 6) {
          wakeSuggestion = '可以接受，但尽量稳定在5:30左右以维持生物钟。';
        } else {
          wakeSuggestion = '建议调整至5:30起床，充分利用脂肪燃烧窗口。';
        }
      }

      const bmr = 10 * currentWeight + 6.25 * USER.heightCm - 5 * USER.age + 5;
      const tdee = bmr * 1.45;
      let calorieTarget = Math.round(tdee - 550);
      if (currentWeight > 92) calorieTarget = Math.round(tdee - 600);
      const proteinGram = Math.round(currentWeight * 2.0);

      let dietAdvice = '';
      if (weightDelta < -2.5) {
        dietAdvice = '体重下降较快，注意保护肌肉，蛋白质必须充足。';
      } else if (weightDelta > 0.3) {
        dietAdvice = '体重轻微反弹，可能水分或饮食松懈。严格控制碳水，断糖。';
      } else {
        dietAdvice = '体重平稳下降，继续保持当前饮食结构。';
      }

      const mealPlan = `
        🔹 总热量约 ${calorieTarget} kcal · 蛋白质 ≥ ${proteinGram}g<br>
        🥣 <strong>早餐</strong> (空腹有氧后): 2个全蛋 + 150g蒸红薯 + 黑咖啡<br>
        🥗 <strong>午餐</strong>: 200g鸡胸/牛肉 + 大量绿叶菜 + 拳头大小杂粮饭<br>
        🐟 <strong>晚餐</strong> (19:00前): 鱼/虾150g + 豆腐蔬菜汤 (无主食)<br>
        ❌ 严禁: 含糖饮料、啤酒、包子油条。无糖可乐每日≤1罐，随餐。
      `;

      let exercisePlan = '';
      if (bmi >= 29.5) {
        exercisePlan = '椭圆机/爬坡快走为主，保护关节。心率140-150，40分钟。';
      } else if (bmi >= 27) {
        exercisePlan = '空腹有氧30分钟 + 下午力量训练(深蹲/硬拉)。';
      } else {
        exercisePlan = '可加入跳跃类动作，继续核心训练(平板支撑/死虫式)。';
      }

      const bellyNote = '每天早晨空腹状态测量腰围。饭后散步15分钟，减少内脏脂肪。';

      const thinkText = `
        📌 当前BMI: ${bmi.toFixed(1)} (${bmi>=28?'肥胖':bmi>=24?'超重':'正常范围'})<br>
        📌 相比初始体重 ${weightDelta.toFixed(1)} kg<br>
        📌 睡眠 ${sleepHours.toFixed(1)}h → 评级: ${sleepQuality}<br>
        📌 20岁男性，四肢肌肉发达，腹部脂肪堆积典型胰岛素抵抗模式。<br>
        📌 基于动态体重与作息，调整热量缺口与训练强度。
      `;

      const finalHtml = `
        <div class="plan-item">
          <strong>🌙 睡眠与作息</strong><br>
          ${sleepAdvice} ${wakeSuggestion}<br>
          <span class="small-note">⏰ 今晚建议入睡: 22:00-22:30 | 明早起: 5:30</span>
        </div>
        <div class="plan-item">
          <strong>🍽️ 今日饮食方案</strong><br>
          ${dietAdvice}<br>
          ${mealPlan}
        </div>
        <div class="plan-item">
          <strong>🏋️ 训练计划</strong><br>
          ${exercisePlan}<br>
          🔹 核心: 平板支撑3组 + 死虫式3组<br>
          🔹 ${bellyNote}
        </div>
        <div class="weight-trend">
          <span>📉 初始95kg → 当前${currentWeight}kg</span>
          <span>🎯 目标腰围明显缩小</span>
        </div>
      `;

      return { thinkText, finalHtml };
    }

    function updateDashboard() {
      const sleepTime = sleepTimeInput.value;
      const wakeTime = wakeTimeInput.value;
      const weight = parseFloat(weightInput.value);

      if (!sleepTime || !wakeTime || isNaN(weight) || weight <= 0) {
        thinkContent.innerHTML = '⚠️ 请完整填写入睡时间、起床时间和空腹体重。';
        finalContent.innerHTML = '<div class="plan-item">等待有效数据...</div>';
        return;
      }

      const sleepHours = calculateSleepHours(sleepTime, wakeTime);
      if (sleepHours === null || sleepHours < 0) {
        thinkContent.innerHTML = '⚠️ 入睡/起床时间不合理，请检查。';
        return;
      }

      const { thinkText, finalHtml } = generateAdvice(sleepHours, weight, wakeTime);
      thinkContent.innerHTML = thinkText;
      finalContent.innerHTML = finalHtml;
    }

    updateBtn.addEventListener('click', updateDashboard);

    window.addEventListener('DOMContentLoaded', () => {
      if (!weightInput.value || weightInput.value === '') {
        weightInput.value = '94.2';
      }
      updateDashboard();
    });
  </script>
</body>
</html>
