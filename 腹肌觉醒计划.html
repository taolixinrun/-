<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腹肌觉醒 · 动态减脂仪表盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(150deg, #0b0b14 0%, #1a1e2b 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #eaeef5;
        }

        .dashboard {
            max-width: 720px;
            width: 100%;
            background: rgba(18, 20, 30, 0.9);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-radius: 44px;
            padding: 30px 24px 32px;
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        h1 {
            font-size: 2.3rem;
            font-weight: 700;
            letter-spacing: -0.4px;
            background: linear-gradient(135deg, #b3e0ff, #6d8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #8892b0;
            margin-bottom: 24px;
            border-left: 4px solid #4f7df3;
            padding-left: 14px;
        }

        .profile-badge {
            background: rgba(10, 12, 22, 0.6);
            border-radius: 100px;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .badge-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge-item span:first-child {
            color: #99a5c0;
        }

        .badge-item strong {
            color: white;
            font-weight: 600;
        }

        .card {
            background: rgba(12, 14, 24, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 22px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-row {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 10px;
        }

        .input-group {
            flex: 1 1 140px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            color: #8e9bb5;
        }

        input {
            background: #1e2230;
            border: 1px solid #2f3548;
            border-radius: 18px;
            padding: 14px 16px;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: 0.2s;
            font-weight: 500;
            width: 100%;
        }

        input:focus {
            border-color: #4f7df3;
            box-shadow: 0 0 0 3px rgba(79, 125, 243, 0.3);
        }

        button {
            background: linear-gradient(135deg, #3152a0, #1a2e5e);
            border: none;
            border-radius: 40px;
            padding: 14px 28px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.3px;
            color: white;
            box-shadow: 0 8px 18px rgba(0, 30, 80, 0.5);
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            white-space: nowrap;
        }

        button:hover {
            background: linear-gradient(135deg, #3d64c0, #233d7a);
            box-shadow: 0 10px 22px rgba(0, 40, 100, 0.7);
        }

        button:active {
            transform: scale(0.97);
        }

        .advice-block {
            margin-top: 20px;
        }

        .think-process {
            background: #1b1f2b;
            border-left: 4px solid #f0b34b;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 18px;
            font-size: 0.9rem;
            color: #cfd7ea;
            line-height: 1.6;
        }

        .think-process strong {
            color: #f5c462;
            display: block;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .final-advice {
            background: #0f1829;
            border-radius: 22px;
            padding: 20px;
            border: 1px solid #2e3b55;
        }

        .final-advice h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #a7c0ff;
            margin-bottom: 16px;
        }

        .plan-item {
            background: #1a1f30;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 12px;
            line-height: 1.7;
        }

        .plan-item strong {
            color: #f0e68c;
        }

        .weight-trend {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            flex-wrap: wrap;
            gap: 8px;
        }

        .small-note {
            font-size: 0.8rem;
            color: #8791a8;
        }

        @media (max-width: 500px) {
            .dashboard {
                padding: 20px 16px;
                border-radius: 32px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .profile-badge {
                gap: 10px;
                font-size: 0.8rem;
                padding: 10px 14px;
            }
            button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>⚡ 腹肌觉醒</h1>
        <div class="subtitle">20岁 · 176cm · 四肢肌肉型 · 腹部臀部脂肪攻坚</div>

        <!-- 固定档案 -->
        <div class="profile-badge">
            <div class="badge-item"><span>🧬 年龄</span><strong>20岁</strong></div>
            <div class="badge-item"><span>📏 身高</span><strong>176 cm</strong></div>
            <div class="badge-item"><span>⚖️ 初始体重</span><strong>95 kg</strong></div>
            <div class="badge-item"><span>🎯 目标</span><strong>瘦肚子·保肌肉</strong></div>
        </div>

        <!-- 每日打卡输入 -->
        <div class="card">
            <div class="input-row">
                <div class="input-group">
                    <label>🌙 昨晚入睡时间</label>
                    <input type="time" id="sleepTime" value="22:00">
                </div>
                <div class="input-group">
                    <label>☀️ 今早起时间</label>
                    <input type="time" id="wakeTime" value="05:30">
                </div>
                <div class="input-group">
                    <label>⚖️ 空腹体重 (kg)</label>
                    <input type="number" id="weightInput" placeholder="94.2" step="0.1" value="94.2">
                </div>
                <button id="updateBtn">📊 更新今日计划</button>
            </div>
            <div class="small-note" style="margin-top: 6px;">💡 每天早起称重后填写，获得动态饮食与运动建议</div>
        </div>

        <!-- 思考过程 + 结论区域 -->
        <div class="advice-block">
            <div class="think-process">
                <strong>🧠 思考过程</strong>
                <div id="thinkContent">等待数据输入... 系统将根据20岁男性、四肢肌肉型、腹部脂肪特点进行分析。</div>
            </div>
            <div class="final-advice">
                <h3>📋 今日动态结论</h3>
                <div id="finalContent">
                    <div class="plan-item">
                        <strong>🍽️ 饮食建议</strong><br>
                        <span>请输入今日体重与作息，生成个性化方案。</span>
                    </div>
                    <div class="plan-item">
                        <strong>🏃 运动与睡眠</strong><br>
                        <span>基于实时数据动态调整。</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 用户固定数据 ==========
        const USER = {
            age: 20,
            heightCm: 176,
            initialWeightKg: 95,
            gender: 'male',
            bodyType: '四肢肌肉型，脂肪主要囤积在腹部和臀部'
        };

        // ========== 获取DOM元素 ==========
        const sleepTimeInput = document.getElementById('sleepTime');
        const wakeTimeInput = document.getElementById('wakeTime');
        const weightInput = document.getElementById('weightInput');
        const updateBtn = document.getElementById('updateBtn');
        const thinkContent = document.getElementById('thinkContent');
        const finalContent = document.getElementById('finalContent');

        // ========== 计算睡眠时长（小时）==========
        function calculateSleepHours(sleepTimeStr, wakeTimeStr) {
            if (!sleepTimeStr || !wakeTimeStr) return null;

            const sleepParts = sleepTimeStr.split(':');
            const wakeParts = wakeTimeStr.split(':');

            const sleepHour = parseInt(sleepParts[0], 10);
            const sleepMin = parseInt(sleepParts[1], 10);
            const wakeHour = parseInt(wakeParts[0], 10);
            const wakeMin = parseInt(wakeParts[1], 10);

            // 假设入睡在晚上，起床在次日早上
            let sleepMinutes = sleepHour * 60 + sleepMin;
            let wakeMinutes = wakeHour * 60 + wakeMin;

            // 如果起床时间小于入睡时间，说明跨天了（正常情况）
            if (wakeMinutes <= sleepMinutes) {
                wakeMinutes += 24 * 60;
            }

            const diffMinutes = wakeMinutes - sleepMinutes;
            return diffMinutes / 60;
        }

        // ========== 核心分析引擎 ==========
        function generateAdvice(sleepHours, currentWeight, wakeTimeStr) {
            // 计算BMI
            const heightM = USER.heightCm / 100;
            const bmi = currentWeight / (heightM * heightM);
            const bmiCategory = bmi >= 28 ? '肥胖' : bmi >= 24 ? '超重' : '正常范围';

            // 体重变化
            const weightDelta = currentWeight - USER.initialWeightKg;

            // 睡眠质量评估
            let sleepQuality = '';
            let sleepAdvice = '';

            if (sleepHours >= 7.2 && sleepHours <= 8.0) {
                sleepQuality = '优秀';
                sleepAdvice = '睡眠时长完美，生长激素分泌充足，非常利于腹部脂肪分解。';
            } else if (sleepHours >= 6.5 && sleepHours < 7.2) {
                sleepQuality = '尚可';
                sleepAdvice = '睡眠略不足，可能轻微影响瘦素分泌。建议今晚提前20分钟入睡。';
            } else if (sleepHours < 6.5) {
                sleepQuality = '不足';
                sleepAdvice = '⚠️ 严重睡眠不足！皮质醇易升高，腹部脂肪会更顽固。今晚务必22:30前上床。';
            } else {
                sleepQuality = '过长';
                sleepAdvice = '睡眠超过8.5小时可能打乱生物钟，建议控制在7-7.5小时。';
            }

            // 起床时间建议
            let wakeSuggestion = '';
            if (wakeTimeStr) {
                const wakeParts = wakeTimeStr.split(':');
                const wH = parseInt(wakeParts[0], 10);
                const wM = parseInt(wakeParts[1], 10);

                if (wH === 5 && wM <= 40) {
                    wakeSuggestion = '起床时间非常理想，完美匹配空腹有氧窗口。';
                } else if (wH === 5 && wM > 40) {
                    wakeSuggestion = '接近理想时间，尽量稳定在5:30左右。';
                } else if (wH === 6) {
                    wakeSuggestion = '可以接受，但建议慢慢调整到5:30以维持生物钟。';
                } else {
                    wakeSuggestion = '建议调整至5:30起床，充分利用脂肪燃烧窗口。';
                }
            }

            // 基础代谢估算 (Mifflin-St Jeor 男性公式)
            const bmr = 10 * currentWeight + 6.25 * USER.heightCm - 5 * USER.age + 5;
            const tdee = bmr * 1.45;
            let calorieTarget = Math.round(tdee - 550);
            if (currentWeight > 92) {
                calorieTarget = Math.round(tdee - 600);
            }

            // 蛋白质推荐
            const proteinGram = Math.round(currentWeight * 2.0);

            // 动态饮食建议
            let dietAdvice = '';
            if (weightDelta < -2.5) {
                dietAdvice = '📉 体重下降较快，务必保证蛋白质摄入，保护肌肉不流失。';
            } else if (weightDelta > 0.3) {
                dietAdvice = '📈 体重轻微反弹，可能水分波动或饮食松懈。今天严格控制碳水，杜绝任何糖分。';
            } else {
                dietAdvice = '✅ 体重平稳下降，继续保持当前饮食结构，效果良好。';
            }

            // 饮食方案
            const mealPlan = `
                🔹 今日目标热量约 <strong>${calorieTarget} kcal</strong> · 蛋白质 ≥ <strong>${proteinGram}g</strong><br>
                🥣 <strong>早餐</strong> (空腹有氧后): 2个全蛋 + 150g蒸红薯 + 黑咖啡<br>
                🥗 <strong>午餐</strong>: 200g鸡胸/牛肉 + 大量绿叶菜 + 拳头大小杂粮饭<br>
                🐟 <strong>晚餐</strong> (19:00前吃完): 鱼/虾150g + 豆腐蔬菜汤 (无主食)<br>
                ❌ <strong>严禁</strong>: 含糖饮料、啤酒、包子、油条、白粥咸菜。<br>
                🥤 无糖可乐每日≤1罐，仅限随餐喝。
            `;

            // 运动计划
            let exercisePlan = '';
            if (bmi >= 29.5) {
                exercisePlan = '🔄 椭圆机或爬坡快走为主，保护关节。<br>🎯 心率保持140-150次/分，每次40分钟。';
            } else if (bmi >= 27) {
                exercisePlan = '🏃 空腹有氧30分钟 + 下午力量训练(深蹲、硬拉)。';
            } else {
                exercisePlan = '💪 可加入跳跃类动作，继续强化核心训练。';
            }

            // 核心训练提醒
            const coreTraining = '平板支撑3组(力竭) + 死虫式3组 + 饭后散步15分钟';

            // 思考过程文本
            const thinkText = `
                📌 当前BMI: <strong>${bmi.toFixed(1)}</strong> (${bmiCategory})<br>
                📌 体重变化: 相比初始95kg <strong>${weightDelta >= 0 ? '+' : ''}${weightDelta.toFixed(1)} kg</strong><br>
                📌 睡眠时长: ${sleepHours.toFixed(1)}小时 → 评级: <strong>${sleepQuality}</strong><br>
                📌 体质分析: 20岁男性，四肢肌肉发达，腹部脂肪堆积，典型胰岛素抵抗模式。<br>
                📌 策略: 基于动态体重与睡眠质量，调整热量缺口与训练强度。
            `;

            // 最终结论HTML
            const finalHtml = `
                <div class="plan-item">
                    <strong>🌙 睡眠与作息</strong><br>
                    ${sleepAdvice}<br>
                    ${wakeSuggestion}<br>
                    <span class="small-note">⏰ 今晚建议入睡: 22:00-22:30 | 明早起床: 5:30</span>
                </div>
                <div class="plan-item">
                    <strong>🍽️ 今日饮食方案</strong><br>
                    ${dietAdvice}<br>
                    ${mealPlan}
                </div>
                <div class="plan-item">
                    <strong>🏋️ 训练计划</strong><br>
                    ${exercisePlan}<br>
                    🔹 <strong>核心训练</strong>: ${coreTraining}<br>
                    🔹 每天早晨空腹测量腰围，记录变化。
                </div>
                <div class="weight-trend">
                    <span>📉 初始95kg → 当前<strong>${currentWeight}kg</strong></span>
                    <span>🎯 目标: 腰围明显缩小，腹肌显现</span>
                </div>
            `;

            return {
                thinkText: thinkText,
                finalHtml: finalHtml
            };
        }

        // ========== 更新仪表盘 ==========
        function updateDashboard() {
            const sleepTime = sleepTimeInput.value;
            const wakeTime = wakeTimeInput.value;
            const weight = parseFloat(weightInput.value);

            // 输入验证
            if (!sleepTime || !wakeTime || isNaN(weight) || weight <= 0) {
                thinkContent.innerHTML = '⚠️ 请完整填写入睡时间、起床时间和空腹体重（体重必须大于0）。';
                finalContent.innerHTML = '<div class="plan-item"><strong>等待有效数据...</strong><br>请在上方填写今日信息后点击"更新今日计划"。</div>';
                return;
            }

            const sleepHours = calculateSleepHours(sleepTime, wakeTime);

            if (sleepHours === null || sleepHours <= 0 || sleepHours > 16) {
                thinkContent.innerHTML = '⚠️ 入睡与起床时间不合理，请检查时间设置。';
                finalContent.innerHTML = '<div class="plan-item"><strong>时间错误</strong><br>入睡时间与起床时间之间的间隔应在0-16小时之间。</div>';
                return;
            }

            // 生成建议
            const result = generateAdvice(sleepHours, weight, wakeTime);

            // 更新页面
            thinkContent.innerHTML = result.thinkText;
            finalContent.innerHTML = result.finalHtml;
        }

        // ========== 绑定事件 ==========
        updateBtn.addEventListener('click', updateDashboard);

        // 页面加载完成后自动执行一次
        window.addEventListener('DOMContentLoaded', function() {
            // 确保默认值存在
            if (!weightInput.value || weightInput.value === '') {
                weightInput.value = '94.2';
            }
            if (!sleepTimeInput.value) {
                sleepTimeInput.value = '22:00';
            }
            if (!wakeTimeInput.value) {
                wakeTimeInput.value = '05:30';
            }
            updateDashboard();
        });

        console.log('✅ 腹肌觉醒 · 动态减脂仪表盘已就绪');
        console.log('👤 用户: 20岁男性, 176cm, 初始95kg');
        console.log('💡 填写每日数据后点击"更新今日计划"获取动态建议');
    </script>

</body>
</html>
