<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>无言·桃李 | 法学保研追踪系统</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 1rem;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 1.5rem 2rem;
      border-radius: 20px;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .brand i {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .monitor-status {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #edf2f7;
      padding: 0.8rem 1.5rem;
      border-radius: 50px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #48bb78;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .nav-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      background: rgba(255, 255, 255, 0.95);
      padding: 0.5rem;
      border-radius: 50px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      overflow-x: auto;
    }

    .tab {
      padding: 0.8rem 1.8rem;
      border-radius: 50px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.3s;
      white-space: nowrap;
      color: #4a5568;
    }

    .tab:hover {
      background: #e2e8f0;
    }

    .tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .panel {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .project-card {
      background: white;
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      border-left: 4px solid #667eea;
      transition: all 0.3s;
    }

    .project-card:hover {
      box-shadow: 0 15px 50px rgba(0,0,0,0.12);
      transform: translateY(-2px);
    }

    .project-card.pre-card {
      border-left-color: #48bb78;
    }

    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .project-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #2d3748;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .timeline-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .time-field {
      background: #f7fafc;
      padding: 0.8rem;
      border-radius: 12px;
    }

    .time-field label {
      display: block;
      font-size: 0.8rem;
      color: #718096;
      margin-bottom: 0.3rem;
      font-weight: 600;
    }

    .time-field input {
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      padding: 0.5rem;
      width: 100%;
      font-size: 0.85rem;
    }

    .time-field input:focus {
      outline: none;
      border-color: #667eea;
    }

    .materials-section {
      background: #f7fafc;
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 1rem;
    }

    .material-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid #e2e8f0;
    }

    .material-item:last-child {
      border-bottom: none;
    }

    .material-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .progress-stages {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin: 1rem 0;
      flex-wrap: wrap;
    }

    .stage {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      background: #edf2f7;
      color: #a0aec0;
      white-space: nowrap;
    }

    .stage.completed {
      background: #48bb78;
      color: white;
    }

    .stage.failed {
      background: #fc8181;
      color: white;
    }

    .stage.current {
      background: #667eea;
      color: white;
    }

    .btn {
      padding: 0.6rem 1.2rem;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-danger {
      background: #fc8181;
      color: white;
    }

    .btn-danger:hover {
      background: #f56565;
    }

    .btn-success {
      background: #48bb78;
      color: white;
    }

    .btn-sm {
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem;
    }

    .btn-outline {
      background: white;
      border: 2px solid #667eea;
      color: #667eea;
    }

    .monitor-panel {
      background: white;
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    }

    .news-item {
      padding: 1rem;
      border-left: 3px solid #667eea;
      margin-bottom: 1rem;
      background: #f7fafc;
      border-radius: 0 12px 12px 0;
      transition: all 0.3s;
    }

    .news-item:hover {
      background: #edf2f7;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #a0aec0;
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    textarea {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      padding: 0.5rem;
      font-size: 0.9rem;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        text-align: center;
      }
      
      .timeline-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .nav-tabs {
        flex-wrap: nowrap;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- 头部 -->
  <div class="header">
    <div class="brand">
      <i class="fas fa-feather-alt"></i>
      <div>
        <h1>无言·桃李</h1>
        <small style="color:#718096;">法学保研追踪系统</small>
      </div>
    </div>
    <div class="monitor-status">
      <div class="status-dot"></div>
      <span>智能监控中 · 985高校法学院</span>
      <small id="lastUpdate">就绪</small>
    </div>
  </div>

  <!-- 导航 -->
  <div class="nav-tabs" id="navTabs">
    <button class="tab active" data-panel="summer"><i class="fas fa-sun"></i> 夏令营</button>
    <button class="tab" data-panel="pre"><i class="fas fa-leaf"></i> 预推免</button>
    <button class="tab" data-panel="offers"><i class="fas fa-gift"></i> Offer接收</button>
    <button class="tab" data-panel="confirm"><i class="fas fa-star"></i> Offer确认</button>
    <button class="tab" data-panel="monitor"><i class="fas fa-satellite"></i> 智能监控</button>
  </div>

  <!-- 夏令营面板 -->
  <div id="summerPanel" class="panel active">
    <div id="summerProjects"></div>
    <button class="btn btn-primary" onclick="addProject('summer')" style="margin-top: 1rem;">
      <i class="fas fa-plus"></i> 新建夏令营项目
    </button>
  </div>

  <!-- 预推免面板 -->
  <div id="prePanel" class="panel">
    <div id="preProjects"></div>
    <button class="btn btn-primary" onclick="addProject('pre')" style="margin-top: 1rem;">
      <i class="fas fa-plus"></i> 新建预推免项目
    </button>
  </div>

  <!-- Offer接收面板 -->
  <div id="offersPanel" class="panel">
    <div id="offersList"></div>
  </div>

  <!-- Offer确认面板 -->
  <div id="confirmPanel" class="panel">
    <div id="confirmContent"></div>
  </div>

  <!-- 智能监控面板 -->
  <div id="monitorPanel" class="panel">
    <div class="monitor-panel">
      <h2 style="margin-bottom: 1rem;"><i class="fas fa-robot"></i> 985高校法学院监控中心</h2>
      <p style="color: #718096; margin-bottom: 1.5rem;">
        实时监控39所985高校法学院官网、微信公众号及保研论坛信息
      </p>
      <div id="monitorNews"></div>
      <button class="btn btn-primary" onclick="refreshMonitor()" style="margin-top:1rem;">
        <i class="fas fa-sync-alt"></i> 刷新监控信息
      </button>
    </div>
  </div>
</div>

<script>
  // 法学专业代码
  const LAW_CODES = {
    '0301': '法学',
    '030101': '法学理论',
    '030102': '法律史',
    '030103': '宪法学与行政法学',
    '030104': '刑法学',
    '030105': '民商法学',
    '030106': '诉讼法学',
    '030107': '经济法学',
    '030108': '环境与资源保护法学',
    '030109': '国际法学',
    '035101': '法律（非法学）',
    '035102': '法律（法学）'
  };

  // 数据结构
  let appData = {
    summerProjects: [],
    preProjects: [],
    offers: [],
    confirmedOffer: null
  };

  // 初始化
  function init() {
    loadData();
    if (appData.offers.length === 0) {
      // 添加默认武汉大学国际法研究所offer
      appData.offers.push({
        id: 'default_whu',
        school: '武汉大学',
        major: '国际法学',
        code: '030109',
        source: '预推免'
      });
      appData.confirmedOffer = 'default_whu';
      saveData();
    }
    renderAll();
    setupTabs();
    startMonitorSimulation();
  }

  function loadData() {
    const saved = localStorage.getItem('wuyantaoli_data');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        appData = {
          summerProjects: parsed.summerProjects || [],
          preProjects: parsed.preProjects || [],
          offers: parsed.offers || [],
          confirmedOffer: parsed.confirmedOffer || null
        };
      } catch(e) {
        console.error('数据加载失败:', e);
      }
    }
  }

  function saveData() {
    localStorage.setItem('wuyantaoli_data', JSON.stringify(appData));
  }

  // 标签页切换
  function setupTabs() {
    document.querySelectorAll('#navTabs .tab').forEach(tab => {
      tab.addEventListener('click', function() {
        // 移除所有active类
        document.querySelectorAll('#navTabs .tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        
        // 添加active类
        this.classList.add('active');
        const panelName = this.dataset.panel;
        const panelMap = {
          'summer': 'summerPanel',
          'pre': 'prePanel',
          'offers': 'offersPanel',
          'confirm': 'confirmPanel',
          'monitor': 'monitorPanel'
        };
        const panelId = panelMap[panelName];
        if (panelId) {
          document.getElementById(panelId).classList.add('active');
        }
      });
    });
  }

  // 创建新项目
  window.addProject = function(type) {
    const school = prompt('请输入学校名称（如：西安交通大学）：');
    if (!school || !school.trim()) return;
    
    const project = {
      id: Date.now().toString(),
      school: school.trim(),
      deadlines: type === 'summer' ? {
        apply: '',
        notice: '',
        campStart: '',
        campEnd: '',
        result: ''
      } : {
        apply: '',
        notice: '',
        interview: '',
        result: ''
      },
      materials: [],
      result: null,
      notes: ''
    };
    
    if (type === 'summer') {
      appData.summerProjects.push(project);
    } else {
      appData.preProjects.push(project);
    }
    
    saveData();
    renderAll();
  };

  // 删除项目
  window.deleteProject = function(projectId, type) {
    if (!confirm('确定删除此项目吗？此操作不可恢复。')) return;
    
    if (type === 'summer') {
      appData.summerProjects = appData.summerProjects.filter(p => p.id !== projectId);
    } else {
      appData.preProjects = appData.preProjects.filter(p => p.id !== projectId);
    }
    
    saveData();
    renderAll();
  };

  // 更新截止日期
  window.updateDeadline = function(projectId, field, value, type) {
    const projects = type === 'summer' ? appData.summerProjects : appData.preProjects;
    const project = projects.find(p => p.id === projectId);
    if (project) {
      project.deadlines[field] = value;
      saveData();
    }
  };

  // 添加材料
  window.addMaterial = function(projectId, type) {
    const name = prompt('请输入材料名称（如：个人陈述、推荐信等）：');
    if (!name || !name.trim()) return;
    
    const projects = type === 'summer' ? appData.summerProjects : appData.preProjects;
    const project = projects.find(p => p.id === projectId);
    if (project) {
      project.materials.push({ 
        id: Date.now().toString(), 
        name: name.trim(), 
        done: false 
      });
      saveData();
      renderAll();
    }
  };

  // 切换材料完成状态
  window.toggleMaterial = function(projectId, materialId, type, checked) {
    const projects = type === 'summer' ? appData.summerProjects : appData.preProjects;
    const project = projects.find(p => p.id === projectId);
    if (project) {
      const material = project.materials.find(m => m.id === materialId);
      if (material) {
        material.done = checked;
        saveData();
      }
    }
  };

  // 删除材料
  window.deleteMaterial = function(projectId, materialId, type) {
    const projects = type === 'summer' ? appData.summerProjects : appData.preProjects;
    const project = projects.find(p => p.id === projectId);
    if (project) {
      project.materials = project.materials.filter(m => m.id !== materialId);
      saveData();
      renderAll();
    }
  };

  // 设置结果
  window.setResult = function(projectId, type) {
    const projects = type === 'summer' ? appData.summerProjects : appData.preProjects;
    const project = projects.find(p => p.id === projectId);
    if (!project) return;
    
    let statusOptions, statusPrompt;
    
    if (type === 'summer') {
      statusOptions = ['未通过', '入营未获优营', '普通营员', '优秀营员'];
      statusPrompt = '请选择夏令营结果：\n1. 未通过\n2. 入营未获优营\n3. 普通营员\n4. 优秀营员\n\n请输入数字或状态名称：';
    } else {
      statusOptions = ['未通过', '等待复试', '复试通过', '获得Offer'];
      statusPrompt = '请选择预推免结果：\n1. 未通过\n2. 等待复试\n3. 复试通过\n4. 获得Offer\n\n请输入数字或状态名称：';
    }
    
    const input = prompt(statusPrompt);
    if (!input) return;
    
    let status;
    // 支持输入数字或文字
    if (/^[1-4]$/.test(input)) {
      status = statusOptions[parseInt(input) - 1];
    } else if (statusOptions.includes(input)) {
      status = input;
    } else {
      alert('输入无效，请重新选择');
      return;
    }
    
    project.result = {
      status: status,
      date: new Date().toISOString().split('T')[0]
    };
    
    // 如果预推免获得Offer，自动添加到offer列表
    if (type === 'pre' && status === '获得Offer') {
      const major = prompt('请输入专业名称（如：国际法学）：', '法学');
      if (!major) return;
      
      const codeInput = prompt('请输入专业代码（如：030109）：\n\n常用代码：\n0301-法学\n030109-国际法学\n035101-法律（非法学）\n035102-法律（法学）', '0301');
      
      const existingOffer = appData.offers.find(o => 
        o.school === project.school && o.major === major
      );
      
      if (!existingOffer) {
        appData.offers.push({
          id: Date.now().toString(),
          school: project.school,
          major: major,
          code: codeInput || '0301',
          source: '预推免'
        });
        alert(`✅ 已自动将 ${project.school} ${major} 添加到Offer接收板块`);
      } else {
        alert('该学校和专业的Offer已存在');
      }
    }
    
    // 如果夏令营获得优秀营员，询问是否添加为offer
    if (type === 'summer' && status === '优秀营员') {
      if (confirm('恭喜获得优秀营员！是否将其添加为有效Offer？')) {
        const major = prompt('请输入专业名称：', '法学');
        if (major) {
          const codeInput = prompt('请输入专业代码：', '0301');
          const existingOffer = appData.offers.find(o => 
            o.school === project.school && o.major === major
          );
          
          if (!existingOffer) {
            appData.offers.push({
              id: Date.now().toString(),
              school: project.school,
              major: major,
              code: codeInput || '0301',
              source: '夏令营优秀营员'
            });
          }
        }
      }
    }
    
    saveData();
    renderAll();
  };

  // 更新备注
  window.updateNotes = function(projectId, type, value) {
    const projects = type === 'summer' ? appData.summerProjects : appData.preProjects;
    const project = projects.find(p => p.id === projectId);
    if (project) {
      project.notes = value;
      saveData();
    }
  };

  // 删除Offer
  window.deleteOffer = function(offerId) {
    if (!confirm('确定删除此Offer吗？')) return;
    appData.offers = appData.offers.filter(o => o.id !== offerId);
    if (appData.confirmedOffer === offerId) {
      appData.confirmedOffer = null;
    }
    saveData();
    renderAll();
  };

  // 确认最终Offer
  window.confirmOffer = function(offerId) {
    appData.confirmedOffer = offerId;
    saveData();
    renderAll();
    const offer = appData.offers.find(o => o.id === offerId);
    if (offer) {
      alert(`🎉 已确认最终去向：${offer.school} ${offer.major}`);
    }
  };

  // 渲染进度条
  function renderProgressStages(type, status) {
    if (!status) return '';
    
    if (type === 'summer') {
      const stages = [
        { name: '申请', completed: true },
        { name: '入营', completed: status !== '未通过' },
        { name: '参营', completed: ['普通营员', '优秀营员'].includes(status) },
        { name: '考核', completed: ['优秀营员'].includes(status) }
      ];
      
      if (status === '未通过') {
        stages[1].failed = true;
      } else if (status === '入营未获优营') {
        stages[2].failed = true;
      }
      
      const finalStage = status === '优秀营员' ? '优秀营员' : 
                        status === '普通营员' ? '普通营员' :
                        status === '入营未获优营' ? '未获优营' : '未通过';
      
      let html = stages.map((stage, index) => {
        let cls = '';
        if (stage.failed) cls = 'failed';
        else if (stage.completed && index < stages.length - 1) cls = 'completed';
        else if (index === stages.length - 1 && stage.completed) cls = 'completed';
        else if (index === stages.length - 1) cls = 'current';
        return `<span class="stage ${cls}">${stage.name}</span>`;
      }).join('<i class="fas fa-chevron-right" style="color:#cbd5e0;margin:0 5px;"></i>');
      
      html += `<i class="fas fa-chevron-right" style="color:#cbd5e0;margin:0 5px;"></i>`;
      const finalCls = status === '优秀营员' ? 'completed' : status === '未通过' ? 'failed' : 'current';
      html += `<span class="stage ${finalCls}">${finalStage}</span>`;
      
      return html;
    } else {
      const stages = [
        { name: '申请', completed: true },
        { name: '通知', completed: status !== '未通过' },
        { name: '复试', completed: ['复试通过', '获得Offer'].includes(status) },
        { name: '结果', completed: status === '获得Offer' }
      ];
      
      if (status === '未通过') {
        stages[1].failed = true;
      } else if (status === '等待复试') {
        // 正常进行中
      }
      
      const finalStage = status === '获得Offer' ? '获得Offer' :
                        status === '复试通过' ? '复试通过' :
                        status === '等待复试' ? '等待复试' : '未通过';
      
      let html = stages.map((stage, index) => {
        let cls = '';
        if (stage.failed) cls = 'failed';
        else if (stage.completed) cls = 'completed';
        else if (index === stages.length - 1) cls = 'current';
        return `<span class="stage ${cls}">${stage.name}</span>`;
      }).join('<i class="fas fa-chevron-right" style="color:#cbd5e0;margin:0 5px;"></i>');
      
      return html;
    }
  }
